<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Captura Offline</title>
    <link rel="stylesheet" href="/output.css" />
  </head>
  <body class="min-h-screen">
    <main class="mx-auto flex min-h-screen w-full max-w-md items-center px-4 py-6">
      <section class="card w-full p-5">
        <header class="mb-5">
          <div class="mb-2 flex items-center gap-2 text-xs text-slate-300">
            <span id="onlineDot" class="h-2.5 w-2.5 rounded-full bg-slate-500"></span>
            <span id="onlineText">Verificando conexion...</span>
          </div>
          <h1 class="text-xl font-semibold tracking-tight text-slate-100">Registro</h1>
          <p class="mt-1 text-sm text-slate-400">Guarda datos y foto sin internet.</p>
        </header>

        <form id="report-form" class="space-y-4" novalidate>
          <div>
            <label class="label" for="fullName">Nombre</label>
            <input id="fullName" name="fullName" class="input" type="text" maxlength="80" required />
          </div>

          <div>
            <label class="label" for="note">Descripcion</label>
            <input id="note" name="note" class="input" type="text" maxlength="180" required />
          </div>

          <div>
            <label class="label" for="photo">Foto</label>
            <input
              id="photo"
              name="photo"
              class="input file:mr-3 file:rounded-lg file:border-0 file:bg-slate-700 file:px-3 file:py-2 file:text-sm file:font-medium file:text-slate-100 hover:file:bg-slate-600"
              type="file"
              accept=".jpg,.jpeg,.png,image/jpeg,image/png"
              required
            />
          </div>

          <div class="grid grid-cols-3 gap-3">
            <button class="btn bg-indigo-500 text-white hover:bg-indigo-400" type="submit">Guardar</button>
            <button
              id="syncNow"
              class="btn border border-slate-600 bg-slate-800 text-slate-200 hover:bg-slate-700"
              type="button"
            >
              Sincronizar
            </button>
            <button
              id="loadRecords"
              class="btn border border-slate-600 bg-slate-800 text-slate-200 hover:bg-slate-700"
              type="button"
            >
              Ver datos
            </button>
          </div>
        </form>

        <div class="mt-4 flex items-center justify-between rounded-xl border border-slate-700 bg-slate-900/60 px-3 py-2 text-sm">
          <span class="text-slate-300">Pendientes por subir</span>
          <span id="pendingCount" class="font-semibold text-indigo-300">0</span>
        </div>

        <section id="recordsSection" class="mt-4 hidden rounded-xl border border-slate-700 bg-slate-900/60 p-3">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-sm font-semibold text-slate-200">Datos en base de datos</h2>
            <span id="recordsCount" class="text-xs text-slate-400">0</span>
          </div>
          <div id="recordsList" class="space-y-3"></div>
        </section>

        <p id="status" class="mt-4 rounded-xl border border-slate-700 bg-slate-800/60 px-3 py-2 text-sm text-slate-200">
          Iniciando...
        </p>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
